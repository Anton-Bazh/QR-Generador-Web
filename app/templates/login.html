<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QR Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--spacing-md);
        }
        .login-card {
            background: var(--bg-secondary);
            backdrop-filter: blur(16px);
            padding: var(--spacing-xl);
            border-radius: var(--border-radius-lg);
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow-heavy);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }
        .login-icon {
            font-size: 3.5rem;
            color: var(--accent-blue);
            margin-bottom: var(--spacing-md);
            filter: drop-shadow(0 0 10px rgba(74, 144, 226, 0.4));
        }
        .alert-error {
            background-color: rgba(231, 76, 60, 0.15);
            border-left: 4px solid #e74c3c;
            color: #fff;
            padding: var(--spacing-sm) var(--spacing-md);
            margin-bottom: var(--spacing-md);
            border-radius: 4px;
            text-align: left;
            font-size: 0.95rem;
        }
        .back-link {
            color: var(--text-gray); 
            text-decoration: none;
            transition: var(--transition-fast);
            display: inline-block;
        }
        .back-link:hover {
            color: var(--white);
            transform: translateX(-3px);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <i class="fas fa-shield-alt login-icon"></i>
            <h2 style="color: var(--white); margin-bottom: var(--spacing-lg);">Panel de Control</h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert-error"><i class="fas fa-exclamation-circle"></i> {{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('admin.login') }}" style="text-align: left;">
                <div class="form-group">
                    <label for="username" class="form-label"><i class="fas fa-user-tie"></i> Usuario</label>
                    <input type="text" class="form-input" id="username" name="username" placeholder="Ingresa tu usuario" required autocomplete="off">
                </div>
                <div class="form-group" style="margin-bottom: var(--spacing-xl);">
                    <label for="password" class="form-label"><i class="fas fa-key"></i> Contraseña</label>
                    <input type="password" class="form-input" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="submit-btn" style="padding: 12px; font-size: 1.15rem;">
                    Acceder al Sistema <i class="fas fa-arrow-right" style="margin-left: 5px;"></i>
                </button>
            </form>
            <div style="margin-top: var(--spacing-xl);">
                <a href="{{ url_for('main.index') }}" class="back-link"><i class="fas fa-chevron-left"></i> Volver al sitio público</a>
            </div>
        </div>
    </div>
</body>
</html>
